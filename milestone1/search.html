<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 1 - Book Search Results</title>

  <!-- CSS for formatting -->
  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#f3f6fb;
      color:#111827;
    }
    .container{
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card{
      background:#fff;
      border:2px solid #d9e2ef;
      border-top:6px solid #0b1f3a;
      border-radius:14px;
      padding:24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }
    h1{
      margin:0 0 6px 0;
      color:#0b1f3a;
      font-size: 26px;
    }
    .subtitle{
      margin:0 0 16px 0;
      color:#4b5563;
      line-height:1.6;
    }
    .nav{
      margin: 14px 0 24px;
    }
    .nav a{
      display:inline-block;
      margin-right:10px;
      padding:8px 12px;
      background:#0b1f3a;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      font-size:14px;
      font-weight:bold;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .book{
      border:1px solid #e5e7eb;
      border-radius:12px;
      background:#ffffff;
      padding: 20px;
    }
    .book-title{
      font-weight:bold;
      color:#0b1f3a;
      margin: 8px 0 6px;
      line-height: 1.3;
    }
    .book-meta{
      font-size: 14px;
      color:#374151;
      line-height: 1.4;
    }
    .thumb{
      width:100%;
      max-height: 180px;
      object-fit: contain;
      border-radius:10px;
      border:1px solid #f1f5f9;
      background:#fff;
    }
    .snippet{
      margin-top: 10px;
      font-size: 14px;
      color:#4b5563;
      line-height: 1.5;
    }
    .links{
      margin-top: 10px;
      font-size: 14px;
    }
    .links a{
      color:#1d4ed8;
      text-decoration:none;
      font-weight:bold;
      margin-right: 10px;
    }
    .links a:hover{
      text-decoration: underline;
    }
    .small{
      font-size: 13px;
      color:#6b7280;
      margin-top: 14px;
    }
    .error{
      background:#fff;
      border:1px solid #fca5a5;
      border-radius:12px;
      padding:18px;
      margin-top: 12px;
    }
    .error strong{ color:#991b1b; }
  </style>
<!--End CSS-->
  
  <!-- Load the jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Milestone 1: Book Search Results</h1>
      <p class="subtitle">
        Display multiple books by using a loop
      </p>
      <div class="nav">
        <a href="../index.html">Home</a>
        <a href="books.html">Single Book Page</a>
      </div>
      <div id="summary">Loading the book search results.....</div>
      <div id="results" class="grid"></div>
    </div>
  </div>

  <!-- Run the code and load teh JSON file -->
  <script>
    $(function () {
      // Load the JSON file
      $.getJSON("google-books-search.json")
        .done(function (data) {
          var book_list = data.items || [];
          $("#summary").html("The Books found: <strong>" + book_list.length + "</strong>");

          // If no books exist, stop here
          if (book_list.length === 0) {
            $("#results").html("<div>There were no books found.</div>");
            return;
          }
          // Loop through each book
          for (var i = 0; i < book_list.length; i++) {
        
            var book_Info = (book_list[i] && book_list[i].volumeInfo) ? book_list[i].volumeInfo : {};
            var book_title = book_Info.title || "No title";
            var author_name = (book_Info.authors && book_Info.authors.length)
            ? book_Info.authors.join(", ") : "N/A";
            var pub_date = book_Info.publishedDate || "N/A";
            var book_desc = book_Info.description || "";
            var info_link = book_Info.infoLink || "";

            // Get the book cover(image)
            var book_cover = "";
            if (book_Info.imageLinks) {
              book_cover = book_Info.imageLinks.thumbnail || book_Info.imageLinks.smallThumbnail || "";
            }
            var short_desc = book_desc;
            if (short_desc.length > 160) {
              short_desc = short_desc.substring(0, 140) + "...";
            }
            if (!short_desc) {
              short_desc = "No description available.";
            }

            // Create the box which shows the information for each books
            var book_card = "";
            book_card += '<div class="book">';
            if (book_cover) {
              book_card += '<img class="thumb" src="' + book_cover + '" alt="Book cover">';
            }
            book_card += '<div class="book-title">' + book_title + '</div>';
            book_card += '<div class="book-meta"><strong>Author(s):</strong> ' + author_name + '</div>';
            book_card += '<div class="book-meta"><strong>Published:</strong> ' + pub_date + '</div>';
            book_card += '<div class="snippet">' + short_desc + '</div>';
            if (info_link) {
              book_card += '<div class="links"><a href="' + info_link + '" target="_blank">More Info</a></div>';
            }
            book_card += '</div>';
            $("#results").append(book_card);
          }
        })
        // If JSON fails or can not load
        .fail(function () {
        $("#summary").html(
        '<div class="error"><strong>Error:</strong> Could not load the search data.</div>'
        );
    });
    });
  </script>
</body>
</html>
