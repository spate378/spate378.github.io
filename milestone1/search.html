<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 1 - Single Book</title>

  <!-- Embedded CSS (required) -->
  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#f3f6fb;
      color:#111827;
    }
    .container{
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card{
      background:#fff;
      border:1px solid #d9e2ef;
      border-top:6px solid #0b1f3a;
      border-radius:12px;
      padding:24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }
    h1{
      margin:0 0 6px 0;
      color:#0b1f3a;
      font-size: 30px;
    }
    .subtitle{
      margin:0 0 16px 0;
      color:#4b5563;
      line-height:1.6;
    }
    .nav{
      margin: 14px 0 24px;
    }
    .nav a{
      display:inline-block;
      margin-right:10px;
      padding:8px 12px;
      background:#0b1f3a;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      font-size:14px;
      font-weight:bold;
    }
    .grid{
      display:flex;
      gap:18px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .cover{
      width: 220px;
      min-width: 220px;
    }
    .cover img{
      width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
      background:#fff;
    }
    .details{
      flex:1;
      min-width: 260px;
    }
    .row{
      margin: 10px 0;
      color:#111827;
      line-height:1.5;
    }
    .label{
      font-weight:bold;
      color:#0b1f3a;
    }
    .desc{
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
      line-height: 1.6;
      color:#1f2937;
    }
    .small{
      font-size: 13px;
      color:#6b7280;
      margin-top: 14px;
    }
    .error{
      background:#fff;
      border:1px solid #fca5a5;
      border-radius:12px;
      padding:16px;
    }
    .error strong{ color:#991b1b; }
    a{ color:#1d4ed8; }
  </style>

  <!-- jQuery allowed (required for this milestone) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Milestone 1: Single Book Display</h1>
      <p class="subtitle">This page reads <strong>google-books-book.json</strong> using JavaScript and jQuery and displays one book.</p>

      <div class="nav">
        <a href="../index.html">Home</a>
        <a href="search.html">Search Results Page</a>
      </div>

      <div id="content">Loading book data...</div>

      <p class="small">
        Note: If this page is opened as a local file (file://), the JSON may not load. Test on your live GitHub Pages site.
      </p>
    </div>
  </div>

  <!-- Embedded JS (required) -->
  <script>
    $(function () {
      $.getJSON("google-books-book.json")
        .done(function (data) {
          // Google Books: single book usually has volumeInfo
          var v = data.volumeInfo || {};

          var title = v.title || "No title available";
          var authors = (v.authors && v.authors.length) ? v.authors.join(", ") : "N/A";
          var publisher = v.publisher || "N/A";
          var publishedDate = v.publishedDate || "N/A";
          var pageCount = v.pageCount || "N/A";
          var categories = (v.categories && v.categories.length) ? v.categories.join(", ") : "N/A";
          var language = v.language || "N/A";
          var description = v.description || "No description available.";

          var previewLink = v.previewLink || "";
          var infoLink = v.infoLink || "";

          // Image (try several sizes)
          var img = "";
          if (v.imageLinks) {
            img = v.imageLinks.thumbnail || v.imageLinks.smallThumbnail || "";
          }

          var html = '';
          html += '<div class="grid">';

          html += '<div class="cover">';
          if (img) {
            html += '<img src="' + img + '" alt="Book cover">';
          } else {
            html += '<div class="row"><span class="label">Cover:</span> N/A</div>';
          }
          html += '</div>';

          html += '<div class="details">';
          html += '<div class="row"><span class="label">Title:</span> ' + title + '</div>';
          html += '<div class="row"><span class="label">Author(s):</span> ' + authors + '</div>';
          html += '<div class="row"><span class="label">Publisher:</span> ' + publisher + '</div>';
          html += '<div class="row"><span class="label">Published Date:</span> ' + publishedDate + '</div>';
          html += '<div class="row"><span class="label">Pages:</span> ' + pageCount + '</div>';
          html += '<div class="row"><span class="label">Categories:</span> ' + categories + '</div>';
          html += '<div class="row"><span class="label">Language:</span> ' + language + '</div>';

          if (previewLink) {
            html += '<div class="row"><span class="label">Preview:</span> <a href="' + previewLink + '" target="_blank">Open Preview</a></div>';
          }
          if (infoLink) {
            html += '<div class="row"><span class="label">More Info:</span> <a href="' + infoLink + '" target="_blank">Open Info Page</a></div>';
          }

          html += '<div class="desc"><span class="label">Description:</span><br>' + description + '</div>';
          html += '</div>';

          html += '</div>';

          $("#content").html(html);
        })
        .fail(function () {
          $("#content").html(
            '<div class="error"><strong>Error:</strong> Could not load google-books-book.json. ' +
            'Make sure the JSON file is in the same folder as this page and test it on the live website (not file://).</div>'
          );
        });
    });
  </script>
</body>
</html>
