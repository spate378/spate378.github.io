<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 1 - Single Book</title>

  <!--CSS code for formatting-->
  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#f3f6fb;
      color:#111827;
    }
    .container{
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card{
      background:#fff;
      border:1px solid #d9e2ef;
      border-top:6px solid #0b1f3a;
      border-radius:12px;
      padding:24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }
    h1{
      margin:0 0 6px 0;
      color:#0b1f3a;
      font-size: 30px;
    }
    .subtitle{
      margin:0 0 16px 0;
      color:#4b5563;
      line-height:1.6;
    }
    .nav{
      margin: 14px 0 24px;
    }
    .nav a{
      display:inline-block;
      margin-right:10px;
      padding:8px 12px;
      background:#0b1f3a;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      font-size:14px;
      font-weight:bold;
    }
    .grid{
      display:flex;
      gap:18px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .cover{
      width: 220px;
      min-width: 220px;
    }
    .cover img{
      width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
      background:#fff;
    }
    .details{
      flex:1;
      min-width: 260px;
    }
    .row{
      margin: 10px 0;
      line-height:1.5;
    }
    .label{
      font-weight:bold;
      color:#0b1f3a;
    }
    .desc{
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
      line-height: 1.6;
      color:#1f2937;
    }
    .error{
      background:#fff;
      border:1px solid #fca5a5;
      border-radius:12px;
      padding:16px;
    }
    .error strong{ color:#991b1b; }
    a{ color:#1d4ed8; }
  </style>

  <!-- Load and handle data from the JSON files -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Milestone 1: Single Book Display</h1>
      <p class="subtitle">
        This page shows the information for a book using data from a JSON file.
      </p>
      <div class="nav">
        <a href="../index.html">Home</a>
        <a href="search.html">Search Results Page</a>
      </div>
      <div id="content">Loading the book data.....</div>
    </div>
  </div>

  <!-- Run the code and laod the json file-->
  <script>
    $(function () {
      $.getJSON("google-books-book.json")
        .done(function (data) {
          // Store book details from the JSON file
          var bookInfo = data.volumeInfo || {};

          //Set defaults inacase something is missing
          var titleText = bookInfo.title || "No title available";
          var authorText = (bookInfo.authors && bookInfo.authors.length)
            ? bookInfo.authors.join(", ")
            : "N/A";
          var publisherText = bookInfo.publisher || "N/A";
          var publishedText = bookInfo.publishedDate || "N/A";
          var pagesText = bookInfo.pageCount || "N/A";
          var categoryText = (bookInfo.categories && bookInfo.categories.length)
            ? bookInfo.categories.join(", ")
            : "N/A";
          var languageText = bookInfo.language || "N/A";
          var descriptionText = bookInfo.description || "No description available.";
          var previewUrl = bookInfo.previewLink || "";
          var infoUrl = bookInfo.infoLink || "";

          // Check for ISBN
          var isbnText = "N/A";
          if (bookInfo.industryIdentifiers && bookInfo.industryIdentifiers.length) {
            isbnText = bookInfo.industryIdentifiers[0].identifier || "N/A";
          }

          // Cover for teh book (image)
          var coverImg = "";
          if (bookInfo.imageLinks) {
            coverImg = bookInfo.imageLinks.thumbnail || bookInfo.imageLinks.smallThumbnail || "";
          }
          // Build the page
          var html = '';
          html += '<div class="grid">';
          html += '<div class="cover">';
          if (coverImg) {
            html += '<img src="' + coverImg + '" alt="Book cover">';
          } else {
            html += '<div class="row"><span class="label">Cover:</span> N/A</div>';
          }
          html += '</div>';

          html += '<div class="details">';
          html += '<div class="row"><span class="label">Title:</span> ' + titleText + '</div>';
          html += '<div class="row"><span class="label">Author(s):</span> ' + authorText + '</div>';
          html += '<div class="row"><span class="label">Publisher:</span> ' + publisherText + '</div>';
          html += '<div class="row"><span class="label">Published Date:</span> ' + publishedText + '</div>';
          html += '<div class="row"><span class="label">Pages:</span> ' + pagesText + '</div>';
          html += '<div class="row"><span class="label">Categories:</span> ' + categoryText + '</div>';
          html += '<div class="row"><span class="label">Language:</span> ' + languageText + '</div>';
          html += '<div class="row"><span class="label">ISBN:</span> ' + isbnText + '</div>';

          if (previewUrl) {
            html += '<div class="row"><span class="label">Preview:</span> <a href="' + previewUrl + '" target="_blank">Open Preview</a></div>';
          }
          if (infoUrl) {
            html += '<div class="row"><span class="label">More Info:</span> <a href="' + infoUrl + '" target="_blank">Open Info Page</a></div>';
          }
          html += '<div class="desc"><span class="label">Description:</span><br>' + descriptionText + '</div>';
          html += '</div>';
          html += '</div>';
          $("#content").html(html);
        })
        .fail(function () {

          // If JSON data does not load or fails data
          $("#content").html(
            '<div class="error"><strong>Error:</strong> Could not load the book data.</div>'
          );
        });
    });
  </script>
</body>
</html>
