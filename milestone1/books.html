<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 1 - Single Book</title>

  <!--CSS code for formatting-->
  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#f3f6fb;
      color:#111827;
    }
    .container{
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card{
      background:#fff;
      border:1px solid #d9e2ef;
      border-top:6px solid #0b1f3a;
      border-radius:12px;
      padding:24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }
    h1{
      margin:0 0 6px 0;
      color:#0b1f3a;
      font-size: 30px;
    }
    .subtitle{
      margin:0 0 16px 0;
      color:#4b5563;
      line-height:1.6;
    }
    .nav{
      margin: 14px 0 24px;
    }
    .nav a{
      display:inline-block;
      margin-right:10px;
      padding:8px 12px;
      background:#0b1f3a;
      color:#fff;
      text-decoration:none;
      border-radius:6px;
      font-size:14px;
      font-weight:bold;
    }
    .grid{
      display:flex;
      gap:18px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .cover{
      width: 220px;
      min-width: 220px;
    }
    .cover img{
      width:100%;
      border-radius:10px;
      border:1px solid #e5e7eb;
      background:#fff;
    }
    .details{
      flex:1;
      min-width: 260px;
    }
    .row{
      margin: 10px 0;
      line-height:1.5;
    }
    .label{
      font-weight:bold;
      color:#0b1f3a;
    }
    .desc{
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
      line-height: 1.6;
      color:#1f2937;
    }
    .error{
      background:#fff;
      border:1px solid #fca5a5;
      border-radius:12px;
      padding:16px;
    }
    .error strong{ color:#991b1b; }
    a{ color:#1d4ed8; }
  </style>
  <!--End CSS-->
  
  <!-- Load and handle data from the JSON files-->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Milestone 1: Single Book Display</h1>
      <p class="subtitle">
        This page shows the information for a book using data from a JSON file.
      </p>
      <div class="nav">
        <a href="../index.html">Home</a>
        <a href="search.html">Search Results Page</a>
      </div>
      <div id="content">Now loading the book data.....</div>
    </div>
  </div>

  <script>
    $(function () {
      function addLine(label, value) {
        return $('<div class="row">')
          .append('<span class="label">' + label + '</span> ')
          .append(document.createTextNode(value));
      }

      $.getJSON("google-books-book.json")
        .done(function (data) {

          var bookData = data.volumeInfo || {};
          var book_title = bookData.title ? bookData.title : "No title available";
          var author_name = (bookData.authors && bookData.authors.length) ? bookData.authors.join(", ") : "N/A";
          var pub_name = bookData.publisher ? bookData.publisher : "N/A";
          var pub_date = bookData.publishedDate ? bookData.publishedDate : "N/A";
          var book_pages = bookData.pageCount ? bookData.pageCount : "N/A";
          var book_genres = (bookData.categories && bookData.categories.length) ? bookData.categories.join(", ") : "N/A";
          var lang = bookData.language ? bookData.language : "N/A";
          var description = bookData.description ? bookData.description : "No description available.";
          var isbnNum = "N/A";
          
          if (bookData.industryIdentifiers && bookData.industryIdentifiers.length > 0) {
            isbnNum = bookData.industryIdentifiers[0].identifier ? bookData.industryIdentifiers[0].identifier : "N/A";
          }

          var cover = "";
          if (bookData.imageLinks) {
            cover = bookData.imageLinks.thumbnail || bookData.imageLinks.smallThumbnail || "";
          }
          var $layoutGrid = $('<div class="grid">');
          var $coverSection = $('<div class="cover">');
          if (cover) {
            $coverSection.append('<img src="' + cover + '" alt="Book cover">');
          } else {
            $coverSection.append(addLine("Cover:", "N/A"));
          }
          var $book_details = $('<div class="details">');
          $book_details.append(addLine("Title:", book_title));
          $book_details.append(addLine("Author(s):", author_name));
          $book_details.append(addLine("Publisher:", pub_name));
          $book_details.append(addLine("Published Date:", pub_date));
          $book_details.append(addLine("Pages:", book_pages));
          $book_details.append(addLine("Categories:", book_genres));
          $book_details.append(addLine("Language:", lang));
          $book_details.append(addLine("ISBN:", isbnNum));

          if (bookData.previewLink) {
            $book_details.append(
              $('<div class="row">')
                .append('<span class="label">Preview:</span> ')
                .append('<a href="' + bookData.previewLink + '" target="_blank">Open Preview</a>')
            );
          }
          if (bookData.infoLink) {
            $book_details.append(
              $('<div class="row">')
            .append('<span class="label">More Info:</span> ')
            .append('<a href="' + bookData.infoLink + '" target="_blank">Open Info Page</a>')
            );
          }

          var $descBox = $('<div class="desc">')
            .append('<span class="label">Description:</span><br>')
            .append(description);

          $book_details.append($descBox);
          $layoutGrid.append($coverSection);
          $layoutGrid.append($book_details);

      $("#content").empty().append($layoutGrid);
        })
.fail(function () {
  $("#content").html(
    '<div class="error"><strong>Error:</strong> There was an issue loading the file.</div>'
  );
});
    });
</script>
</body>
</html>
