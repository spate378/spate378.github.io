<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 3 - Book Search SPA</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Book Search</h1>
      <p class="subtitle">Search for books or browse my personal bookshelf — powered by the Google Books API.</p>
      <div class="nav">
        <a href="#" id="navSearch" class="nav-active">Search</a>
        <a href="#" id="navShelf">My Bookshelf</a>
      </div>

      <div id="searchSection">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by keyword, title, or author">
          <button id="searchBtn">Search</button>
      </div>
        <div id="summary" class="summary-text">Enter a keyword to start searching for a book.</div>
        <div id="pagination" class="pagination"></div>
        <div id="results" class="grid"></div>
      </div>

      <div id="shelfSection" style="display:none;">
        <p class="subtitle">A handpicked collection of books from my personal shelf.</p>
        <div id="shelfSummary" class="summary-text">Loading bookshelf.....</div>
        <div id="shelfResults" class="grid"></div>
      </div>

      <div id="detailsSection" style="display:none;">
        <button id="backBtn" class="back-btn">Back</button>
        <div id="detailsContent">Loading....</div>
      </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
