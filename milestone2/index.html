<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 2 - Book Search</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Milestone 2: Book Search</h1>
      <p class="subtitle">
        Find for books using the Google Books API.
      </p>

      <div class="nav">
        <a href="index.html">Home</a>
        <a href="bookshelf.html">The Bookshelf</a>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Enter a book title or keyword">
        <button id="searchBtn">Search</button>
      </div>

      <div class="controls">
        <label for="pageSelect">Page:</label>
        <select id="pageSelect"></select>
      </div>

      <div id="summary">Search for a book to begin.</div>
      <div id="results" class="grid"></div>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
