<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone 2 - Book Search</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Search for Books</h1>
      <p class="subtitle">Look for book using Google Books API.</p>
      <div class="nav">
        <a href="index.html">Home</a>
        <a href="bookshelf.html">My Bookshelf</a>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by the keyword, title, or an author">
        <button id="searchBtn">Search</button>
      </div>

      <div class="controls">
        <label for="pageSelect">Page:</label>
        <select id="pageSelect"></select>
      </div>
      <div id="summary">Enter a book to start.</div>
      <div id="results" class="grid"></div>
      </div>
</div>
<script src="script.js"></script>
</body>
</html>
